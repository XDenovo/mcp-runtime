name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      # XDenovo org policy blocks the default GITHUB_TOKEN from creating or
      # approving pull requests (org-wide, not overridable per repo). Mint a
      # short-lived token from the xdenovo-release-bot GitHub App instead,
      # scoped to just Contents:write + Pull requests:write.
      - name: Generate release-please token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Check out release tag
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ steps.release.outputs.tag_name }}

      - name: Install uv and Python
        if: ${{ steps.release.outputs.release_created }}
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.30"
          python-version: "3.13"
          enable-cache: true

      - name: Build distributions
        if: ${{ steps.release.outputs.release_created }}
        run: uv build

      - name: Upload release assets
        if: ${{ steps.release.outputs.release_created }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ steps.release.outputs.tag_name }} dist/* --repo ${{ github.repository }}
